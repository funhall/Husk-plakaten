# Codemagic — officielle workflows for release-linjen (uden brug af main).
# Branch: release/rigtig-version (og backup/testet-android-2026-05-10 når den matcher).
# Android: Kotlin i roden (gradlew).
# iOS: Flutter ligger i flutter_app/ (pubspec.yaml + ios/) så det ikke kolliderer med Android-projektet i roden.
#
# Artifact-stier må ikke ligge i gitignorerede mapper (.gitignore). Kopier derfor til codemagic_ipa/
# og evt. CM_EXPORT_DIR ifølge Codemagic built-in env vars.
#
# App Store Connect upload: Bruger Codemagic-integrationen med Apple API-nøgle (samme som signing).
# Navnet skal matche Team settings → Apple Developer Portal (her: HuskMig-ASC-Key).

workflows:
  huskplakaten-android-debug:
    name: Husk Plakaten Android (Kotlin debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Gradlew executable
        script: chmod +x ./gradlew
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build debug APK
        script: ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/**/*.apk

  huskplakaten-flutter-ios:
    name: Husk Plakaten iOS (Flutter IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: flutter_app
    integrations:
      app_store_connect: HuskMig-ASC-Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dk.funhall.huskmig
    scripts:
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Sync Flutter version from version.properties
        script: dart "$CM_BUILD_DIR/scripts/sync_app_version.dart"
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods install
        script: |
          cd ios && pod install
      - name: Flutter build IPA (release)
        # Codemagic: use-profiles skriver /Users/builder/export_options.plist — uden den får man ofte kun .xcarchive, ingen .ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Stage IPA for Publishing (non-gitignored paths)
        script: |
          set -e
          STAGING="$CM_BUILD_DIR/codemagic_ipa"
          mkdir -p "$STAGING"
          n=0
          while IFS= read -r -d '' f; do
            cp "$f" "$STAGING/"
            n=$((n+1))
          done < <(find build/ios -name "*.ipa" -type f -print0 2>/dev/null)
          if [ "$n" -eq 0 ]; then
            echo "Ingen .ipa fundet. Tjek export_options.plist (trinnet forinden)."
            find build/ios -maxdepth 4 \( -name "*.ipa" -o -name "*.xcarchive" \) 2>/dev/null || true
            exit 1
          fi
          ls -la "$STAGING"
          if [ -n "${CM_EXPORT_DIR:-}" ]; then
            mkdir -p "$CM_EXPORT_DIR"
            cp "$STAGING"/*.ipa "$CM_EXPORT_DIR/"
            ls -la "$CM_EXPORT_DIR"
          fi
    artifacts:
      - codemagic_ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: false
