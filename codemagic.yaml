# Codemagic — officielle workflows for release-linjen (uden brug af main).
# Branch: release/rigtig-version (og backup/testet-android-2026-05-10 når den matcher).
# 1) Kotlin Android debug APK — kræver app/ + Gradle.
#
# Flutter iOS IPA er ikke defineret her: denne branch har kun native Android (ingen pubspec.yaml / ios/).
# Når et Flutter-projekt merges til roden, kan workflow "huskplakaten-flutter-ios" tilføjes igen med
# flutter pub get → pod install → flutter build ipa — se git-historik.

workflows:
  huskplakaten-android-debug:
    name: Husk Plakaten Android (Kotlin debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Gradlew executable
        script: chmod +x ./gradlew
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build debug APK
        script: ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/**/*.apk
