# Codemagic — officielle workflows for release-linjen (uden brug af main).
# Branch: release/rigtig-version (og backup/testet-android-2026-05-10 når den matcher).
# Android: Kotlin i roden (gradlew).
# iOS: Flutter ligger i flutter_app/ (pubspec.yaml + ios/) så det ikke kolliderer med Android-projektet i roden.
#
# Artifact-mønstre er relative til clone-roden (CM_BUILD_DIR), jf. Codemagic-dokumentation — ikke til working_directory.
# Vi kopierer derfor .ipa til out/ efter build, så Publishing altid har et forudsigeligt mønster.

workflows:
  huskplakaten-android-debug:
    name: Husk Plakaten Android (Kotlin debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Gradlew executable
        script: chmod +x ./gradlew
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build debug APK
        script: ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/**/*.apk

  huskplakaten-flutter-ios:
    name: Husk Plakaten iOS (Flutter IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: flutter_app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dk.funhall.huskmig
    scripts:
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Sync Flutter version from version.properties
        script: dart "$CM_BUILD_DIR/scripts/sync_app_version.dart"
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods install
        script: |
          cd ios && pod install
      - name: Flutter build IPA (release)
        script: flutter build ipa --release
      - name: Stage IPA into repo root out/ for artifact pickup
        script: |
          mkdir -p "$CM_BUILD_DIR/out"
          if ! ls build/ios/ipa/*.ipa 1> /dev/null 2>&1; then
            echo "No .ipa under build/ios/ipa — listing build/ios for debug:"
            find build/ios -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp build/ios/ipa/*.ipa "$CM_BUILD_DIR/out/"
          ls -la "$CM_BUILD_DIR/out/"
    artifacts:
      - out/*.ipa
      - flutter_app/build/ios/ipa/**/*.ipa
